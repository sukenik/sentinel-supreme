services:
    postgres:
        image: postgres:16-alpine
        container_name: sentinel-postgres
        restart: unless-stopped
        ports:
            - '${PG_PORT}:5432'
        environment:
            POSTGRES_USER: ${PG_USER}
            POSTGRES_PASSWORD: ${PG_PASSWORD}
            POSTGRES_DB: ${PG_DB}
        volumes:
            - postgres_data:/var/lib/postgresql/data
        healthcheck:
            test: ['CMD-SHELL', 'pg_isready -U ${PG_USER} -d ${PG_DB}']
            interval: 10s
            timeout: 5s
            retries: 5
            start_period: 30s
        networks:
            - sentinel-network

    mongodb:
        image: mongo:7
        container_name: sentinel-mongodb
        restart: unless-stopped
        ports:
            - '${MONGO_PORT}:27017'
        environment:
            MONGO_INITDB_ROOT_USERNAME: ${MONGO_USER}
            MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD}
            MONGO_INITDB_DATABASE: ${MONGO_DB}
        volumes:
            - mongodb_data:/data/db
        healthcheck:
            test: ['CMD', 'mongosh', '--eval', "db.adminCommand('ping')"]
            interval: 10s
            timeout: 5s
            retries: 5
            start_period: 30s
        networks:
            - sentinel-network

    rabbitmq:
        image: rabbitmq:3.13-management-alpine
        container_name: sentinel-rabbitmq
        restart: unless-stopped
        ports:
            - '${RMQ_PORT}:5672'
            - '${RMQ_MANAGEMENT_PORT}:15672'
        environment:
            RABBITMQ_DEFAULT_USER: ${RMQ_USER}
            RABBITMQ_DEFAULT_PASS: ${RMQ_PASSWORD}
            RABBITMQ_DEFAULT_VHOST: ${RMQ_VHOST}
        volumes:
            - rabbitmq_data:/var/lib/rabbitmq
        healthcheck:
            test: ['CMD', 'rabbitmq-diagnostics', '-q', 'ping']
            interval: 10s
            timeout: 5s
            retries: 5
            start_period: 30s
        networks:
            - sentinel-network

    redis:
        image: redis:7-alpine
        container_name: sentinel-redis
        restart: unless-stopped
        command: redis-server --appendonly yes
        volumes:
            - redis_data:/data
        ports:
            - '${REDIS_PORT}:6379'
        networks:
            - sentinel-network

    qdrant:
        image: qdrant/qdrant:latest
        container_name: sentinel-qdrant
        restart: unless-stopped
        ports:
            - '${QDRANT_PORT}:6333'
        volumes:
            - qdrant_storage:/qdrant/storage
        healthcheck:
            test: ['CMD', 'curl', '-f', 'http://localhost:${QDRANT_PORT}/healthz']
            interval: 10s
            timeout: 5s
            retries: 5
        networks:
            - sentinel-network

    prometheus:
        image: prom/prometheus:latest
        container_name: sentinel-prometheus
        restart: unless-stopped
        ports:
            - '${PROMETHEUS_PORT}:9090'
        volumes:
            - ./prometheus.yml:/etc/prometheus/prometheus.yml
            - prometheus_data:/prometheus
        command:
            - '--config.file=/etc/prometheus/prometheus.yml'
            - '--storage.tsdb.path=/prometheus'
        networks:
            - sentinel-network

    grafana:
        image: grafana/grafana:latest
        container_name: sentinel-grafana
        restart: unless-stopped
        ports:
            - '${GRAFANA_PORT}:3000'
        environment:
            - GF_SECURITY_ADMIN_PASSWORD=${GF_SECURITY_ADMIN_PASSWORD}
        volumes:
            - grafana_data:/var/lib/grafana
        networks:
            - sentinel-network

volumes:
    postgres_data:
        driver: local
    mongodb_data:
        driver: local
    rabbitmq_data:
        driver: local
    redis_data:
        driver: local
    qdrant_storage:
        driver: local
    prometheus_data:
        driver: local
    grafana_data:
        driver: local

networks:
    sentinel-network:
        driver: bridge
        name: sentinel-network
